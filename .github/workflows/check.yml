name: Check VOX Showtimes

on:
  schedule:
    - cron: "*/3 * * * *"   # every 15 minutes
  workflow_dispatch: {}       # lets you click "Run workflow" manually to test

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Run checker
        env:
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
        run: python check_showtimes.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.txt
          git diff --staged --quiet || git commit -m "Update state"
          git push
